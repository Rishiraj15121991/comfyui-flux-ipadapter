name: Build & Push comfyui-catvton-flux

# Bakes FLUX.1-Fill-dev (~12 GB) + LoRA (717 MB) into the image.
# Uses maximize-build-space to get ~70 GB free on the runner.

on:
  push:
    branches: [master]
    paths:
      - 'Dockerfile.catvton'
      - '.github/workflows/build-catvton.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - uses: actions/checkout@v4

      - name: Report free disk space
        run: |
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get clean
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.catvton
          push: true
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: |
            mak15121991/comfyui-catvton-flux:latest
            mak15121991/comfyui-catvton-flux:v18-full-bake
          cache-from: type=registry,ref=mak15121991/comfyui-catvton-flux:buildcache
          cache-to: type=registry,ref=mak15121991/comfyui-catvton-flux:buildcache,mode=max
