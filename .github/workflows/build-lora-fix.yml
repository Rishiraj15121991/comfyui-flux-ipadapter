name: Build & Push comfyui-catvton-flux (LoRA fix)

# Thin layer on top of :latest — just adds xiaozaa/catvton-flux-lora-alpha (717 MB).
# Free runners handle this fine (no 40 GB model download required).

on:
  push:
    branches: [master]
    paths:
      - 'Dockerfile.lora-fix'
      - '.github/workflows/build-lora-fix.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get clean
          docker image prune -af || true
          df -h

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (thin LoRA layer)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.lora-fix
          push: true
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: |
            mak15121991/comfyui-catvton-flux:latest
            mak15121991/comfyui-catvton-flux:v11-lora-fix
          cache-from: |
            type=registry,ref=mak15121991/comfyui-catvton-flux:buildcache
            type=registry,ref=mak15121991/comfyui-catvton-flux:latest
          cache-to: type=registry,ref=mak15121991/comfyui-catvton-flux:buildcache,mode=max
